# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude for architecture discussion, scoring-formula design, debugging
  (including the candidates.jsonl format bug, honeypot detection logic, and
  domain_fit_score corrections), and documentation. No candidate data was
  sent to any external LLM API as part of the ranking pipeline itself —
  rank.py performs no LLM calls; all reasoning strings are rule-based
  templates over real candidate field values.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-phase pipeline: offline precompute (Colab T4) generates BGE
  (bge-small-en-v1.5) sentence embeddings, 10-dim career features, and
  10-dim behavioral features for all 100K candidates; online ranking
  (Docker, CPU, <5min) combines them via
  final = 0.40*semantic_cosine + 0.35*career_score + 0.25*behavioral_score,
  with honeypots hard-zeroed before scoring.

  Career score applies consulting, research, and domain-fit penalties
  multiplicatively (not as additive weight terms) on top of a weighted
  feature dot product — this lets a single strong disqualifier (e.g.
  CV-primary career history, consulting-only background) suppress a
  candidate regardless of how strong other features look, which a purely
  additive model can't do.

  Semantic embedding input uses skill-duration thresholding (skills held
  ≥12 months are emphasized; shorter-duration "expert" claims are
  down-weighted) to prevent keyword-stuffed profiles from inflating
  semantic similarity. YoE uses a tent function (peaks at 5-9 years) rather
  than monotonic scaling, penalizing both under- and over-qualification.

  Exact search via NumPy dot product over L2-normalized embeddings replaces
  a vector database at this scale (~50ms for 100K candidates), with no
  ANN approximation loss.

